<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bébé en Voyage 👶 — Joueur</title>
<link rel="stylesheet" href="style.css">
<script src="vendor/peerjs.min.js"></script>
</head>
<body class="phone">

  <!-- ÉCRAN CONNEXION -->
  <div id="joinScreen" class="pscreen">
    <h1>👶✈️</h1>
    <h2>Bébé en Voyage</h2>
    <input type="text" id="roomInput" placeholder="Code de la salle" maxlength="4" autocapitalize="characters" autocomplete="off">
    <input type="text" id="nameInput" placeholder="Ton prénom" maxlength="12" autocomplete="off">
    <button id="joinBtn" class="btn btn-big">Rejoindre 🚀</button>
    <p id="joinStatus" class="join-status"></p>
  </div>

  <!-- ÉCRAN JEU (plein écran, tape pour sauter) -->
  <div id="playScreen" class="hidden">
    <canvas id="playCanvas"></canvas>
    <div id="hud">
      <span id="hudName"></span>
      <span id="hudStatus">En attente du lancement…</span>
    </div>
    <div id="tapHint">👆 Touche l'écran pour SAUTER</div>
    <div id="phoneBanner" class="hidden"></div>
    <div id="rotateHint">🔄 Tourne ton téléphone en mode paysage&nbsp;!</div>
    <div id="phoneReveal" class="hidden">
      <div id="phoneRevealText"></div>
    </div>
  </div>

<script src="game.js"></script>
<script src="controller.js"></script>
</body>
</html>
